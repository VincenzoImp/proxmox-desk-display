server:
  bind: 0.0.0.0
  port: 8765
  display_token_env: DISPLAY_TOKEN
  poll_interval_seconds: 10
  stale_after_seconds: 45

proxmox:
  - id: lab-a
    name: Lab A
    base_url: https://192.168.1.10:8006
    token_env: PVE_A_TOKEN
    tls:
      mode: fingerprint
      fingerprint: SHA256:REPLACE_WITH_CERT_FINGERPRINT

  - id: lab-b
    name: Lab B
    base_url: https://192.168.1.11:8006
    token_env: PVE_B_TOKEN
    tls:
      mode: fingerprint
      fingerprint: SHA256:REPLACE_WITH_CERT_FINGERPRINT

alerts:
  memory_warning_pct: 85
  memory_critical_pct: 95
  storage_warning_pct: 80
  storage_critical_pct: 90

guests:
  pinned:
    - source: lab-a
      id: "100"
      label: Home Assistant
      expected: running
    - source: lab-b
      id: "101"
      label: Docker
      expected: running
