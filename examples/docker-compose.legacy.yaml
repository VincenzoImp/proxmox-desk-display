services:
  bridge:
    build:
      context: ../apps/bridge
    image: proxmox-desk-display:local
    container_name: proxmox-desk-display
    restart: unless-stopped
    ports:
      - "8765:8765"
    env_file:
      - ../.env
    volumes:
      - ../config.yaml:/config.yaml:ro
    command: ["--config", "/config.yaml"]
